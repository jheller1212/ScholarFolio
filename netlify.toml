[build]
  command = "npm run build"
  publish = "dist"

# Production: main branch → scholarfolio.org
[context.production]
  environment = { VITE_SUPABASE_URL = "https://mixaxkywkojoclgbjjur.supabase.co" }

# Staging and PR previews use production Supabase so edge functions,
# auth, and data all work. The protection is code review before merge.
# The staging Supabase project (ziuhowdrhdcogyqvvhst) is kept as a
# fallback for destructive DB testing if needed.

# Staging: develop branch → develop--scholarfolio.netlify.app
[context.branch-deploy]
  environment = { VITE_SUPABASE_URL = "https://mixaxkywkojoclgbjjur.supabase.co" }

# PR deploy previews → deploy-preview-NNN--scholarfolio.netlify.app
[context.deploy-preview]
  environment = { VITE_SUPABASE_URL = "https://mixaxkywkojoclgbjjur.supabase.co" }

[functions]
  directory = "netlify/functions"

[[edge_functions]]
  path = "/"
  function = "og-meta"

# Canonical profile paths (/scholar/<id>) need the same crawler OG injection
[[edge_functions]]
  path = "/scholar/*"
  function = "og-meta"

# ORCID OAuth callback
[[redirects]]
  from = "/api/orcid-callback"
  to = "/.netlify/functions/orcid-callback"
  status = 200

# Canonicalize www → non-www. Auth (incl. the ORCID magic-link round-trip) and
# the session live per-origin; serving both www and non-www split the session
# and silently signed ORCID users out. Force a 301 to the non-www canonical host.
[[redirects]]
  from = "https://www.scholarfolio.org/*"
  to = "https://scholarfolio.org/:splat"
  status = 301
  force = true

# Sitemap redirect must come before the SPA catch-all
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Embeddable citation badge (SVG served by function, before catch-all)
[[redirects]]
  from = "/badge/*"
  to = "/.netlify/functions/badge?id=:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
